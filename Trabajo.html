<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Conexión al CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="login-box">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ej: Juanito" required>
        
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
        
        <button type="submit">Ingresar</button>
    </form>
    <!-- Se agregó <form> para permitir el envío con la tecla Enter -->
    <p id="mensaje"></p>
</main>
<!--CAMBIOS REALIZADOS: 
  - Se cambió la estructura a etiquetas semánticas (main y form).
  - Se añadieron labels para mejorar la accesibilidad.-->
  
  <!--modificado por: DUVAN JEREZ-->
  
  <!-- Conexión al JS -->
  <script src="script.js"></script>

</body>

</html>
